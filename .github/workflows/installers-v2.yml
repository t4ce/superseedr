name: Installers v2

on:
  push:
    branches:
      - installers_v2
  workflow_dispatch:
    inputs:
      macos_suffix:
        description: macOS DMG variant to build
        required: true
        default: normal
        type: choice
        options:
          - normal
          - private
          - unsigned
          - all
      include_windows:
        description: Build Windows installers too
        required: true
        default: false
        type: boolean

concurrency:
  group: installers-v2-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  APP_NAME: superseedr
  CARGO_TERM_COLOR: always

jobs:
  windows_installers:
    name: Windows installers v2 (${{ matrix.suffix }})
    if: ${{ github.ref == 'refs/heads/installers_v2' && github.event_name == 'workflow_dispatch' && inputs.include_windows }}
    runs-on: windows-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: normal
            flags: ""
          - suffix: private
            flags: "--no-default-features"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-installers-v2-${{ matrix.suffix }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-installers-v2-${{ matrix.suffix }}-
            ${{ runner.os }}-cargo-

      - name: Install WiX Toolset v3
        shell: pwsh
        run: choco install wixtoolset --no-progress -y

      - name: Install cargo-wix
        shell: pwsh
        run: |
          if (Get-Command cargo-wix -ErrorAction SilentlyContinue) {
            Write-Host "Using cached cargo-wix"
            cargo wix --version
          } else {
            cargo install cargo-wix
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build MSI installer
        id: build_msi
        shell: pwsh
        run: |
          if ("${{ matrix.flags }}" -eq "") {
            Write-Host "Running: cargo wix"
            cargo wix
          } else {
            Write-Host "Running: cargo build --release ${{ matrix.flags }}"
            cargo build --release ${{ matrix.flags }}

            Write-Host "Running: cargo wix --no-build"
            cargo wix --no-build
          }

          $msi = Get-ChildItem -Path "target/wix" -Filter "*.msi" | Select-Object -First 1
          if ($null -eq $msi) {
            Write-Error "No .msi file found in target/wix"
            exit 1
          }
          "msi_path=$($msi.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build per-user EXE installer
        id: build_exe
        shell: pwsh
        run: |
          $flavor = "${{ matrix.suffix }}"
          .\scripts\build_windows_user_installer.ps1 -Flavor $flavor -SkipBuild -Backend inno

          $exe = Get-ChildItem -Path "target/installer/windows" -Filter "*.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($null -eq $exe) {
            Write-Error "No .exe installer found in target/installer/windows"
            exit 1
          }
          "exe_path=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Stage installer artifacts
        id: stage
        shell: pwsh
        run: |
          $version = (Select-String -Path "Cargo.toml" -Pattern '^version\s*=\s*"([^"]+)"' | Select-Object -First 1).Matches.Groups[1].Value
          if (-not $version) {
            $version = "dev"
          }

          $suffix = "${{ matrix.suffix }}"
          New-Item -ItemType Directory -Force -Path staging | Out-Null

          if ($suffix -eq "normal") {
            $msiName = "${{ env.APP_NAME }}_$version`_x64_en-US.msi"
            $exeName = "${{ env.APP_NAME }}-$version-x64-setup.exe"
          } else {
            $msiName = "${{ env.APP_NAME }}-$suffix`_$version`_x64_en-US.msi"
            $exeName = "${{ env.APP_NAME }}-$suffix-$version-x64-setup.exe"
          }

          Copy-Item -LiteralPath "${{ steps.build_msi.outputs.msi_path }}" -Destination "staging/$msiName" -Force
          Copy-Item -LiteralPath "${{ steps.build_exe.outputs.exe_path }}" -Destination "staging/$exeName" -Force

          Get-ChildItem staging | Format-Table Name, Length, LastWriteTime

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v7
        with:
          name: superseedr-installers-v2-${{ matrix.suffix }}-${{ github.run_number }}
          path: staging/*

  macos_dmg:
    name: macOS DMG v2 (${{ matrix.suffix }})
    if: github.ref == 'refs/heads/installers_v2'
    runs-on: macos-latest
    timeout-minutes: 120
    env:
      KEYCHAIN_NAME: build.keychain
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(github.event_name == 'push' && '{"include":[{"suffix":"normal","flags":"","signing_mode":"signed"}]}' || inputs.macos_suffix == 'normal' && '{"include":[{"suffix":"normal","flags":"","signing_mode":"signed"}]}' || inputs.macos_suffix == 'private' && '{"include":[{"suffix":"private","flags":"--no-default-features","signing_mode":"signed"}]}' || inputs.macos_suffix == 'unsigned' && '{"include":[{"suffix":"unsigned","flags":"","signing_mode":"unsigned"}]}' || '{"include":[{"suffix":"normal","flags":"","signing_mode":"signed"},{"suffix":"private","flags":"--no-default-features","signing_mode":"signed"},{"suffix":"unsigned","flags":"","signing_mode":"unsigned"}]}') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-installers-v2-dmg-${{ matrix.suffix }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-installers-v2-dmg-${{ matrix.suffix }}-
            ${{ runner.os }}-cargo-

      - name: Install DMG tooling
        run: brew install create-dmg

      - name: Setup macOS Keychain and Certificate
        if: matrix.signing_mode == 'signed'
        id: setup_keychain
        env:
          APPLE_INSTALLER_CERT_P12_BASE64: ${{ secrets.APPLE_INSTALLER_CERT_P12_BASE64 }}
          APPLE_INSTALLER_CERT_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERT_PASSWORD }}
        run: |
          security create-keychain -p "$RUNNER_TEMP" "$KEYCHAIN_NAME"
          security list-keychains -s "$KEYCHAIN_NAME"
          security default-keychain -s "$KEYCHAIN_NAME"
          security unlock-keychain -p "$RUNNER_TEMP" "$KEYCHAIN_NAME"

          echo $APPLE_INSTALLER_CERT_P12_BASE64 | base64 --decode > certificate.p12
          security import certificate.p12 -k "$KEYCHAIN_NAME" -P "$APPLE_INSTALLER_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          rm certificate.p12

          curl --fail --location --retry 3 --output DeveloperIDG2CA.cer https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          curl --fail --location --retry 3 --output DeveloperIDCA.cer https://www.apple.com/certificateauthority/DeveloperIDCA.cer
          security import DeveloperIDG2CA.cer -k "$KEYCHAIN_NAME"
          security import DeveloperIDCA.cer -k "$KEYCHAIN_NAME"
          rm DeveloperIDG2CA.cer DeveloperIDCA.cer

          security set-key-partition-list -S apple-tool:,apple: -s -k "$RUNNER_TEMP" "$KEYCHAIN_NAME"

          echo "Waiting for keychain to settle..."
          sleep 2

          CERT_CN=$(security find-identity -v "$KEYCHAIN_NAME" | grep "Developer ID Installer" | head -n 1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$CERT_CN" ]; then
            echo "::error:: No valid Developer ID Installer identity found in keychain."
            security find-identity -v "$KEYCHAIN_NAME"
            exit 1
          fi

          echo "Using certificate: $CERT_CN"
          echo "CERT_NAME=$CERT_CN" >> "$GITHUB_ENV"

      - name: Build DMG
        id: build_dmg
        run: |
          script_path="scripts/build_osx_universal_dmg.sh"
          chmod +x "$script_path"
          cert_name="${{ env.CERT_NAME }}"
          if [ "${{ matrix.signing_mode }}" = "unsigned" ]; then
            cert_name="--unsigned"
          fi

          set -o pipefail
          "$script_path" \
            "0.0.0-installers-v2-${{ github.run_number }}" \
            "${{ matrix.suffix }}" \
            "$cert_name" \
            ${{ matrix.flags }} \
            2>&1 | tee build_log.txt

          dmg_path=$(grep 'DMG_PATH=' build_log.txt | head -n 1 | sed -n 's/.*DMG_PATH=\(.*\)/\1/p' | tr -d '[:space:]')
          if [ -z "$dmg_path" ]; then
            echo "::error::Build script finished, but 'DMG_PATH=' was not found in the log."
            exit 1
          fi

          echo "dmg_path=$dmg_path" >> "$GITHUB_OUTPUT"

      - name: Verify DMG
        run: hdiutil verify "${{ steps.build_dmg.outputs.dmg_path }}"

      - name: Notarize and Staple DMG
        if: matrix.signing_mode == 'signed'
        id: notarize
        env:
          APPLE_NOTARY_USERNAME: ${{ secrets.APPLE_NOTARY_USERNAME }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          dmg_file_path="${{ steps.build_dmg.outputs.dmg_path }}"
          echo "Submitting $dmg_file_path for notarization..."

          xcrun notarytool submit "$dmg_file_path" \
            --apple-id "$APPLE_NOTARY_USERNAME" \
            --password "$APPLE_NOTARY_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          echo "Notarization successful. Stapling ticket..."
          xcrun stapler staple "$dmg_file_path"
          xcrun stapler validate "$dmg_file_path"

      - name: Stage DMG artifact
        id: stage
        run: |
          mkdir -p staging
          suffix="${{ matrix.suffix }}"
          version="0.0.0-installers-v2-${{ github.run_number }}"

          if [ "$suffix" = "normal" ]; then
            dmg_name="${{ env.APP_NAME }}-$version-universal-macos.dmg"
          else
            dmg_name="${{ env.APP_NAME }}-$version-$suffix-universal-macos.dmg"
          fi

          dmg_zip_name="$dmg_name.zip"
          ditto -c -k --sequesterRsrc --keepParent "${{ steps.build_dmg.outputs.dmg_path }}" "staging/$dmg_zip_name"
          shasum -a 256 "staging/$dmg_zip_name"
          ls -lh staging
          echo "artifact_path=staging/$dmg_zip_name" >> "$GITHUB_OUTPUT"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: superseedr-installers-v2-macos-${{ matrix.suffix }}-${{ github.run_number }}
          path: ${{ steps.stage.outputs.artifact_path }}
          archive: false

      - name: Cleanup Keychain
        if: always() && matrix.signing_mode == 'signed'
        run: security delete-keychain "$KEYCHAIN_NAME"
